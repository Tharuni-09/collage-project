<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body, html {
            height: 100vh;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #01193d;
        }
        .login-box {
            width: 360px;
            padding: 30px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .login-box h2 { margin-top: 0; }
        .form-stacked label {
            display: block;
            margin: 8px 0 4px 0;
        }
        .form-stacked input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .btn-primary {
            padding: 10px 20px;
            background: #1e88e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
        .error { color: #d32f2f; }
        .message { color: #388e3c; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login</h2>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        {% if message %}
        <p class="message">{{ message }}</p>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}" class="form-stacked">
            <label>Roll / UID:
                <input type="text" name="uid" placeholder="Enter roll number or UID" required />
            </label>
            <label>Password:
                <input type="password" name="password" required />
            </label>
            <label>Role:
                <select name="role" required>
                    <option value="student">Student</option>
                    <option value="faculty">Faculty</option>
                </select>
            </label>
            <button type="submit" class="btn-primary">Login</button>
        </form>

        <p>
            <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
        </p>
    </div>
</body>
</html>
