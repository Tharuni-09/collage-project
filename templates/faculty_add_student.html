{% extends "base.html" %}

{% block title %}Add Student{% endblock %}

{% block content %}
<div class="container">
    <h2>Add Student</h2>

    <form method="post" action="{{ url_for('faculty_add_student') }}">

        <div class="form-row">
            <label>Username *</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-row">
            <label>Password *</label>
            <input type="password" name="password" required>
        </div>

        <div class="form-row">
            <label>Department *</label>
            <select name="department" required>
                <option value="ACSML">ACSML</option>
                <option value="NCSML">NCSML</option>
                <option value="DCSML">DCSML</option>
            </select>
        </div>

        <div class="form-row">
            <label>Roll *</label>
            <input type="text" name="roll" required>
        </div>

        <div class="form-row">
            <label>Name *</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-row">
            <label>CGPA *</label>
            <input type="number" step="0.01" name="cgpa" required>
        </div>

        <div class="form-row">
            <label>SGPA *</label>
            <input type="number" step="0.01" name="sgpa" required>
        </div>

        <div class="form-row">
            <label>Attendance *</label>
            <input type="number" name="attendance" required>
        </div>
	<div class="form-row">
        <label>Email</label>
        <input type="email" name="email" required>
	</div>

	<div class="form-row">
	<label>Phone</label>
	<input type="tel" name="phone" required>
	</div>

        <button type="submit">Add Student</button>
        <a href="{{ url_for('faculty_dashboard') }}">Cancel</a>
    </form>
</div>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f7fb;
    color: #1f2937;
}

.container {
    max-width: 700px;
    width: 90%;
    margin: 20px auto;
    padding: 20px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-family: Arial, sans-serif;
    box-sizing: border-box;
}

h2 {
    margin: 0 0 24px;
    font-size: 28px;
    font-weight: 700;
    color: #111827;
    text-align: center;
}

form {
    display: grid;
    gap: 16px;
}

.form-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
}

label {
    font-size: 14px;
    font-weight: 600;
    color: #374151;
}

input, select {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 15px;
    background: #fff;
    transition: border-color 0.2s, box-shadow 0.2s;

}

input:focus, select:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
}

button, a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 42px;
    padding: 0 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
}

button {
    background: #2563eb;
    color: #fff;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

</style>

{% endblock %}
