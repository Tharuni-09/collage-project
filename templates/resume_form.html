{% extends "base.html" %}
{% block content %}
<div class="resume-form-wrap">
    <h1 class="page-title">Resume Builder</h1>
    <p class="page-subtitle">Enter your details and choose a template to generate your PDF resume.</p>

    <form action="{{ url_for('generate') }}" method="POST" enctype="multipart/form-data" class="resume-form">
        <div class="form-section">
            <h3>1. Select Resume Template</h3>
            <div class="template-previews">
                <label class="preview">
                    <input type="radio" name="template" value="classic" checked>
                    <div class="preview-label">Classic ATS</div>
                </label>
                <label class="preview">
                    <input type="radio" name="template" value="modern">
                    <div class="preview-label">Modern Sidebar</div>
                </label>
                <label class="preview">
                    <input type="radio" name="template" value="minimal">
                    <div class="preview-label">Minimalist</div>
                </label>
                <label class="preview">
                    <input type="radio" name="template" value="academic">
                    <div class="preview-label">Academic</div>
                </label>
                <label class="preview">
                    <input type="radio" name="template" value="creative">
                    <div class="preview-label">Creative</div>
                </label>
            </div>
        </div>

        <div class="form-section">
            <h3>2. Personal Details</h3>
            
            <div class="form-grid">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" value="{{ session.get('name', '') }}" required>
                </div>
                <div class="form-group">
                    <label>Profile Photo (Optional)</label>
                    <input type="file" name="profile_photo" accept="image/*">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone" maxlength="10" pattern="[0-9]{10}" required>
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="city">
                </div>
                <div class="form-group">
                    <label>State</label>
                    <input type="text" name="state">
                </div>
                <div class="form-group">
                    <label>Country</label>
                    <input type="text" name="country" value="India">
                </div>
                <div class="form-group full-width">
                    <label>LinkedIn Profile</label>
                    <input type="url" name="linkedin" placeholder="https://www.linkedin.com/in/yourprofile">
                </div>
                <div class="form-group full-width">
                    <label>GitHub Profile</label>
                    <input type="url" name="github" placeholder="https://github.com/yourprofile">
                </div>
                 <div class="form-group full-width">
                    <label>Personal Website/Portfolio (Optional)</label>
                    <input type="url" name="website" placeholder="https://yourportfolio.com">
                 </div>
            </div> <!-- Corrected nested div -->
        </div>

        <div class="form-section">
            <h3>3. Academic Qualification</h3>
            <div class="form-group full-width">
                <label>Are you a PG Student?</label>

                <select id="educationType" onchange="togglePG()">
                    <option value="ug">UG Student</option>
                    <option value="pg">PG Student</option>
                </select>
            </div>

            <div id="pgSection" style="display:none;">
                <div class="academic-content form-grid">
                    <div class="form-group"><label>University/College</label><input type="text" name="pg_college"></div>
                    <div class="form-group"><label>Degree</label><select name="pg_degree"><option value="">Select Degree</option><option>MCA</option><option>M.Tech</option><option>M.Sc</option><option>MBA</option><option>MA</option><option>M.Com</option><option>Other</option></select></div>
                    <div class="form-group"><label>Branch</label><input type="text" name="pg_branch"></div>
                    <div class="form-group"><label>CGPA/Percentage</label><input type="text" name="pg_score"></div>
                </div>
            </div>

            <details class="academic-details" open>
                <summary>Under Graduation (UG)</summary>
                <div class="academic-content form-grid">
                    <div class="form-group"><label>University/College</label><input type="text" name="ug_college" required></div>
                    <div class="form-group"><label>Degree</label><select name="ug_degree" required><option value="">Select Degree</option><option>B.Tech</option><option>B.E</option><option>BCA</option><option>B.Sc</option><option>B.Com</option><option>BA</option><option>BBA</option><option>Other</option></select></div>
                    <div class="form-group"><label>Branch/Field</label><input type="text" name="field_of_study" required></div>
                    <div class="form-group"><label>CGPA/Percentage</label><input type="text" name="ug_score" required></div>
                    <div class="form-group"><label>Graduation Year</label><input type="text" name="grad_year"></div>
                </div>
            </details>

            <details class="academic-details">
                <summary>Intermediate (12th)</summary>
                <div class="academic-content form-grid">
                    <div class="form-group"><label>College Name</label><input type="text" name="inter_college"></div>
                    <div class="form-group"><label>Percentage/Grade</label><input type="text" name="inter_percentage"></div>
                </div>
            </details>

            <details class="academic-details">
                <summary>SSC (10th)</summary>
                <div class="academic-content form-grid">
                    <div class="form-group"><label>School Name</label><input type="text" name="ssc_school"></div>
                    <div class="form-group"><label>Percentage/Grade</label><input type="text" name="ssc_percentage"></div>
                </div>
            </details>
        </div>

        <hr class="section-divider">

        <div class="form-section">
            <h3>4. Skills & Projects</h3>
            <style>
                /* Academic Qualification Accordion Styling */
                .academic-details { margin-bottom: 12px; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; background: #fff; }
                .academic-details summary { padding: 12px 16px; font-weight: 700; cursor: pointer; background: #f8fafc; color: #1e293b; list-style: none; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
                .academic-details summary:hover { background: #f1f5f9; }
                .academic-details summary::-webkit-details-marker { display: none; }
                .academic-details summary::after { content: '▼'; font-size: 10px; color: #64748b; transition: transform 0.2s; }
                .academic-details[open] summary { border-bottom: 1px solid #e2e8f0; }
                .academic-details[open] summary::after { transform: rotate(180deg); }
                .academic-content { padding: 16px; background: #fff; }

             
                .project-block { border-top: 1px solid #ddd; padding-top: 15px; margin-top: 15px; }
                .project-block:first-child { border-top: none; padding-top: 0; margin-top: 0; }

            .section-divider{border:none; height:1px; background:#d1d5db; margin:15px 0 25px;   }
            </style>

            <div class="form-group full-width">
                <label>Career Objective</label>
                <textarea name="objective" rows="3" placeholder="A brief objective about your career goals..."></textarea>
            </div>

            <div id="skills-container" class="form-group full-width">
                <label>Technical Skills</label>
                <div class="skill-input-row" style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="text" name="skill_name" placeholder="Skill Name" style="flex: 2;">
                    <div>
                    <select name="skill_level">
                        <option>Beginner</option>
                        <option>Intermediate</option>
                        <option>Advanced</option>
                    </select>
                    </div>
                    <button type="button" onclick="addSkillRow()" class="btn-primary" style="padding: 0 15px;">+</button>
                </div>
            </div>

            <div id="projects-container" class="form-group full-width">
                <label>Projects</label>
                <div class="project-block">
                    <label>Project Title</label>
                    <input type="text" name="project_title" class="projectTitle" placeholder="Project Name">

                    <label>Technologies Used</label> 
                    <input type="text" name="project_technology" placeholder="Python, Django, MySQL">
                    
                    <label style="margin-top: 10px; display: block;">Key Features / Modules</label>
                    <textarea class="projectFeatures" rows="2" placeholder="Login System, Payment Gateway, Cart, Admin Panel..."></textarea>
                    
                    <button type="button" onclick="generateAIProject(this)" class="btn-primary" style="margin: 10px 0;">Fill Project Details (AI)</button>
                    
                    <label style="display: block;">Project Description (Bullet Points)</label>
                    <textarea name="projects" class="projectOutput" rows="5" placeholder="AI will generate bullet points here..."></textarea>
                </div>
            </div>
            <button type="button" onclick="addProjectRow()" class="btn-primary" style="margin-bottom: 20px;">+ Add Another Project</button>

            <div class="form-group">
                <label>Resume Type</label>

                <select id="resumeType"
                        onchange="toggleExperience()">
                    <option value="fresher">
                        Fresher
                    </option>

                    <option value="experienced">
                        Experienced
                    </option>
                </select>
            </div>

            <div id="experienceSection">
            <div class="form-group full-width">
                <label>Work Experience / Internships (one per line)</label>
                <textarea name="work_experience" rows="3" placeholder="e.g. SDE Intern at Google"></textarea>
            </div>
            <div class="form-group full-width">
                <label>Certifications (one per line)</label>
                <textarea name="certifications" rows="2" placeholder="e.g. AWS Certified Solutions Architect"></textarea>
            </div>
            </div>
            <div class="form-group full-width">
                <label>Languages</label>
                <input type="text" name="languages" placeholder="English, Hindi...">
            </div>
        <button type="submit" class="btn-primary full-width">Generate Resume PDF</button>
    </form>
</div>
<script>
    
    function addSkillRow() {
        const container = document.getElementById('skills-container');
        const newRow = document.createElement('div');
        newRow.className = 'skill-input-row';
        newRow.style = 'display: flex; gap: 10px; margin-top: 10px; align-items: center;';
        newRow.innerHTML = `
        <input type="text"
            name="skill_name"
            placeholder="Skill Name"
            style="flex:2; min-width:250px;">

        <select name="skill_level"
                style="width:150px;">
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
        </select>

        <button type="button"
        onclick="this.parentElement.remove()"
        class="btn-delete">
        -
        </button>
        `;
        container.appendChild(newRow);
    }

    function addProjectRow() {
        const container = document.getElementById('projects-container');
        const newBlock = document.createElement('div');
        newBlock.className = 'project-block';
        newBlock.innerHTML = `
            <label>Project Title</label>
            <input type="text" name="project_title" class="projectTitle" placeholder="Project Name">
            <label>Technologies Used</label> 
            <input type="text" name="project_technology" placeholder="Python, Django, MySQL">
            <label style="margin-top: 10px; display: block;">Project Features</label>
            <textarea class="projectFeatures" rows="2" placeholder="Login System, Payment Gateway, Cart, Admin Panel..."></textarea>
            <button type="button" onclick="generateAIProject(this)" class="btn-primary" style="margin: 10px 0;">Fill Project Details (AI)</button>
            <label style="display: block;">Project Description (Bullet Points)</label>
            <textarea name="projects" class="projectOutput" rows="5"></textarea>
            <button type="button" onclick="this.parentElement.remove()" class="btn-delete" style="margin-top:5px;">Remove Project</button>
        `;
        container.appendChild(newBlock);
    }

    async function generateAIProject(btn) {
        const block = btn.parentElement;
        const title = block.querySelector(".projectTitle").value;
        const features = block.querySelector(".projectFeatures").value;
        const output = block.querySelector(".projectOutput");

        if (!title) { alert("Please enter a project title first."); return; }

        btn.innerText = "Generating...";
        btn.disabled = true;

        try {
            let response = await fetch("/generate_project_description", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ title, features })
            });

            let data = await response.json();
            if (data.success) {
                output.value = data.description;
            } else {
                alert("AI Service is currently busy (Error 503). Please try again in a few moments or write the description manually.");
            }
        } catch (e) {
            alert("Failed to connect to AI service. Please check your connection.");
        } finally {
            btn.innerText = "Fill Project Details (AI)";
            btn.disabled = false;
        }
    }
</script>
<script>
function togglePG(){
    const type=document.getElementById("educationType").value;
    document.getElementById("pgSection").style.display=
        type==="pg" ? "block" : "none";
}
</script>
<script>
function toggleExperience(){
    const type=document.getElementById("resumeType").value;

    document.getElementById("experienceSection").style.display =
        type==="experienced" ? "block" : "none";
}
window.onload = function() {
    toggleExperience();
    togglePG();
}
</script>
{% endblock %}
